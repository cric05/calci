<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>CALCULATOR..</title>
</head>
<body>
    <div class="color" id="color">
            <i class="bi bi-palette-fill"></i>
            </div>
             <div class="palette-options" id="palette-options">
                        <!-- Solid Colors -->

                        <span class="color-option" style="--color-opt: #00ffff;" data-color="#00ffff"></span>
                        <span class="color-option" style="--color-opt: #ff0000;" data-color="#ff0000"></span>
                        <span class="color-option" style="--color-opt: #00ff7f;" data-color="#00ff7f"></span>
                        <span class="color-option" style="--color-opt: #ffa500;" data-color="#ffa500"></span>
                        <span class="color-option" style="--color-opt: #ff007f;" data-color="#ff007f"></span>
                        <span class="color-option" style="--color-opt: #8a2be2;" data-color="#8a2be2"></span>
                        <span class="color-option" style="--color-opt: #00A36C;" data-color="#00A36C"></span>
                        <!-- New OrangeRed -->
                    </div>
        
    <div id="cal">
        
    
            <input id="dis" placeholder=" " readonly>
        <div id="key">
            <Button onclick="app('+')"  class="g">+</Button>
            <Button onclick="app('7')">7</Button>
            <Button onclick="app('8')">8</Button>
            <Button onclick="app('9')">9</Button>
            <Button onclick="app('-')" class="g">-</Button>
            <Button onclick="app('6')">6</Button>
            <Button onclick="app('5')">5</Button>
            <Button onclick="app('4')">4</Button>
            <Button onclick="app('*')" class="g">*</Button>
            <Button onclick="app('1')">1</Button>
            <Button onclick="app('2')">2</Button>
            <Button onclick="app('3')">3</Button>
            <Button onclick="app('/')" class="g">/</Button>
            <Button onclick="app('.')">.</Button>
            <Button onclick="app('0')">0</Button>
            <Button onclick="cal()">Cal</Button>
            <Button onclick="clearr()" class="g">C</Button>
            <button onclick="del()">E</button>
            <button onclick="app('%')">%</button>
            <button onclick="sqrt()" class="gh">√</button>


        </div>

   
</body>
 <script src="cal.js"></script>
</html>
